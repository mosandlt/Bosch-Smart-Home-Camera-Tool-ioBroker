name: Test and Release

# Run for every push on main, every PR, and tag pushes that match a semver
# release (with optional pre-release suffix, e.g. v0.4.0-rc.1). The tag patterns
# match what repochecker expects for a Latest-Repo-eligible adapter.
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request:
    branches: [main]

# Cancel previous PR/branch runs when a new commit is pushed.
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Type-check + lint on the lowest supported Node version. Cheap, fails fast.
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint
        run: npm run lint
        continue-on-error: true # ESLint v9 migration in progress

  # Run the unit + package test suites across the supported Node matrix. Mirrors
  # the iobroker.example "adapter-tests" job that repochecker looks for.
  adapter-tests:
    runs-on: ubuntu-latest
    needs: check-and-lint
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  # Publish to npm on tag pushes only. Needs both upstream gates to be green so
  # a tagged commit can never publish without a clean check + test run.
  deploy:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [check-and-lint, adapter-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
